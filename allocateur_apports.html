<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Allocateur d'apports</title>
		<style>
			:root {
				--bg1: #2d353b;
				--bg2: #232a2e;
				--bg3: rgba(71, 82, 88, 0.5);
				--ui1: #475258;
				--ui2: #4f585e;
				--ui3: #525c62;
				--tx1: #d3c6aa;
				--tx2: #9da9a0;
				--tx3: #7a8478;
				--accent: #a7c080;
				--accent-dim: rgba(167, 192, 128, 0.12);
				--accent-border: rgba(167, 192, 128, 0.3);
				--color-red: #e67e80;
				--color-red-dim: rgba(230, 126, 128, 0.12);
				--color-red-border: rgba(230, 126, 128, 0.25);
				--color-orange: #e69875;
				--color-orange-dim: rgba(230, 152, 117, 0.12);
				--color-orange-border: rgba(230, 152, 117, 0.25);
				--color-green: #a7c080;
				--color-green-dim: rgba(167, 192, 128, 0.12);
				--color-green-border: rgba(167, 192, 128, 0.25);
				--color-blue: #7fbbb3;
				--color-blue-dim: rgba(127, 187, 179, 0.12);
				--color-blue-border: rgba(127, 187, 179, 0.25);
				--color-purple: #d699b6;
				--color-purple-dim: rgba(214, 153, 182, 0.12);
				--color-purple-border: rgba(214, 153, 182, 0.25);
				--radius-s: 6px;
				--radius: 10px;
				--radius-l: 14px;
				--font:
					"Fira Code", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
				--mono: "Fira Code", "SF Mono", Consolas, monospace;
				--transition: 180ms ease;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html {
				font-size: 15px;
			}

			body {
				font-family: var(--font);
				background: var(--bg2);
				color: var(--tx1);
				line-height: 1.55;
				min-height: 100vh;
				-webkit-font-smoothing: antialiased;
			}

			.app {
				max-width: 680px;
				margin: 0 auto;
				padding: 28px 32px 80px;
			}

			@media (max-width: 720px) {
				.app {
					padding: 20px 16px 80px;
				}
			}

			.app-header {
				padding: 24px 0 20px;
				border-bottom: 1px solid var(--ui1);
				margin-bottom: 24px;
			}

			.app-title {
				font-size: 1.4rem;
				font-weight: 600;
				letter-spacing: -0.02em;
				color: var(--tx1);
			}

			.card {
				background: var(--bg1);
				border: 1px solid var(--ui1);
				border-radius: var(--radius);
				padding: 16px;
				margin-bottom: 12px;
			}

			.card-label {
				font-size: 0.72rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1.2px;
				color: var(--tx2);
			}

			.input-group {
				margin-bottom: 12px;
			}

			.input-label {
				display: block;
				font-size: 0.78rem;
				color: var(--tx2);
				margin-bottom: 4px;
				font-weight: 500;
			}

			input[type="number"],
			input[type="text"] {
				width: 100%;
				background: var(--bg2);
				border: 1px solid var(--ui1);
				border-radius: var(--radius-s);
				padding: 10px 12px;
				color: var(--tx1);
				font-family: var(--font);
				font-size: 0.95rem;
				outline: none;
				transition: border-color var(--transition);
			}

			input:focus {
				border-color: var(--accent);
				box-shadow: 0 0 0 2px var(--accent-dim);
			}

			input.error {
				border-color: var(--color-red);
				box-shadow: 0 0 0 2px var(--color-red-dim);
			}

			.amount-input {
				font-family: var(--mono);
				font-size: 1.6rem;
				font-weight: 600;
				text-align: center;
				padding: 14px;
				letter-spacing: -0.02em;
			}

			.amount-input::placeholder {
				color: var(--tx3);
				font-weight: 400;
			}

			.btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 6px;
				padding: 10px 20px;
				border: none;
				border-radius: var(--radius-s);
				font-family: var(--font);
				font-size: 0.88rem;
				font-weight: 600;
				cursor: pointer;
				transition: all var(--transition);
				user-select: none;
			}

			.btn-primary {
				background: var(--accent);
				color: var(--bg2);
				width: 100%;
				padding: 12px;
			}

			.btn-primary:hover:not(:disabled) {
				filter: brightness(1.1);
			}
			.btn-primary:active:not(:disabled) {
				transform: scale(0.98);
			}
			.btn-primary:disabled {
				opacity: 0.3;
				cursor: not-allowed;
			}

			.btn-confirm {
				background: var(--accent);
				color: var(--bg2);
				padding: 10px 24px;
				border-radius: var(--radius-s);
			}

			.btn-confirm:hover {
				filter: brightness(1.1);
			}
			.btn-confirm:active {
				transform: scale(0.98);
			}

			.btn-ghost {
				background: transparent;
				color: var(--tx2);
				padding: 6px 12px;
				font-size: 0.78rem;
			}

			.btn-ghost:hover {
				color: var(--tx1);
				background: var(--bg3);
			}

			.btn-danger {
				background: var(--color-red-dim);
				color: var(--color-red);
				border: 1px solid var(--color-red-border);
				font-size: 0.8rem;
				padding: 8px 14px;
			}

			.btn-danger:hover {
				background: rgba(230, 126, 128, 0.2);
			}

			.funds-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px;
				margin-bottom: 12px;
			}

			@media (max-width: 520px) {
				.funds-grid {
					grid-template-columns: 1fr;
				}
			}

			.fund-card {
				background: var(--bg1);
				border: 1px solid var(--ui1);
				border-radius: var(--radius);
				padding: 14px;
				position: relative;
			}

			.fund-card::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 2px;
				border-radius: var(--radius) var(--radius) 0 0;
			}

			.fund-card.urgence::before {
				background: var(--color-red);
			}
			.fund-card.reserve::before {
				background: var(--color-orange);
			}
			.fund-card.plaisir::before {
				background: var(--color-purple);
			}
			.fund-card.etf::before {
				background: var(--color-blue);
			}

			.fund-name {
				font-size: 0.72rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1px;
				color: var(--tx2);
				margin-bottom: 8px;
			}

			.fund-amounts {
				display: flex;
				align-items: baseline;
				gap: 6px;
				margin-bottom: 6px;
			}

			.fund-current {
				font-family: var(--mono);
				font-size: 1.15rem;
				font-weight: 600;
			}

			.fund-target {
				font-family: var(--mono);
				font-size: 0.78rem;
				color: var(--tx2);
			}

			.fund-bar {
				height: 4px;
				background: var(--ui3);
				border-radius: 2px;
				overflow: hidden;
				margin-bottom: 8px;
			}

			.fund-bar-fill {
				height: 100%;
				border-radius: 2px;
				transition: width 400ms ease;
			}

			.fund-edit-label {
				font-size: 0.68rem;
				color: var(--tx3);
				margin-bottom: 2px;
			}

			.fund-solo-input {
				font-family: var(--mono);
				font-size: 0.82rem;
				padding: 6px 8px;
				text-align: right;
			}

			.fund-edit-row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 6px;
			}

			.fund-edit-row input {
				font-family: var(--mono);
				font-size: 0.82rem;
				padding: 6px 8px;
				text-align: right;
			}

			.result-panel {
				display: none;
				margin-top: 0;
			}

			.result-panel.visible {
				display: block;
				animation: fadeSlide 300ms ease;
			}

			.result-divider {
				border: none;
				border-top: 1px solid var(--ui1);
				margin: 14px 0;
			}

			.etf-rule {
				margin-top: 6px;
				font-size: 0.78rem;
				color: var(--tx2);
			}

			.etf-rule strong {
				color: var(--color-blue);
				font-weight: 600;
			}

			@keyframes fadeSlide {
				from {
					opacity: 0;
					transform: translateY(-8px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.result-title {
				font-size: 0.78rem;
				font-weight: 600;
				color: var(--accent);
				text-transform: uppercase;
				letter-spacing: 1px;
				margin-bottom: 12px;
			}

			.result-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 8px 0;
				border-bottom: 1px solid rgba(71, 82, 88, 0.4);
			}

			.result-row:last-of-type {
				border-bottom: none;
			}

			.result-label {
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 0.88rem;
			}

			.result-dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				flex-shrink: 0;
			}

			.result-amount {
				font-family: var(--mono);
				font-weight: 600;
				font-size: 0.95rem;
			}

			.result-rule {
				margin-top: 12px;
				padding: 10px 12px;
				background: var(--bg2);
				border-radius: var(--radius-s);
				font-size: 0.8rem;
				color: var(--tx2);
				line-height: 1.6;
			}

			.result-rule .rule-icon {
				margin-right: 6px;
			}

			.toggle-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 10px 14px;
				background: var(--bg1);
				border: 1px solid var(--ui1);
				border-radius: var(--radius);
				cursor: pointer;
				margin-bottom: 2px;
				transition: background var(--transition);
			}

			.toggle-header:hover {
				background: var(--bg3);
			}

			.toggle-header .chevron {
				transition: transform var(--transition);
				color: var(--tx2);
				font-size: 0.8rem;
			}

			.toggle-header.open .chevron {
				transform: rotate(180deg);
			}
			.toggle-header.open {
				border-radius: var(--radius) var(--radius) 0 0;
				margin-bottom: 0;
				border-bottom: none;
			}

			.toggle-body {
				display: none;
				background: var(--bg1);
				border: 1px solid var(--ui1);
				border-top: none;
				border-radius: 0 0 var(--radius) var(--radius);
				padding: 16px;
				margin-bottom: 12px;
			}

			.toggle-body.open {
				display: block;
			}

			.settings-row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 12px;
				margin-bottom: 12px;
			}

			.settings-row:last-child {
				margin-bottom: 0;
			}

			@media (max-width: 420px) {
				.settings-row {
					grid-template-columns: 1fr;
				}
			}

			.ratio-display {
				text-align: center;
				padding: 8px;
				background: var(--bg2);
				border-radius: var(--radius-s);
				margin-bottom: 12px;
				font-size: 0.82rem;
				color: var(--tx2);
				transition: all var(--transition);
			}

			.ratio-display.valid {
				color: var(--color-green);
				border: 1px solid var(--color-green-border);
				background: var(--color-green-dim);
			}

			.ratio-display.invalid {
				color: var(--color-red);
				border: 1px solid var(--color-red-border);
				background: var(--color-red-dim);
			}

			.totals-row {
				display: flex;
				justify-content: space-around;
				gap: 12px;
				padding: 8px 0;
				flex-wrap: wrap;
			}

			.total-item {
				text-align: center;
				min-width: 70px;
			}

			.total-value {
				font-family: var(--mono);
				font-weight: 700;
				font-size: 1.05rem;
			}

			.total-label {
				font-size: 0.7rem;
				color: var(--tx2);
				text-transform: uppercase;
				letter-spacing: 0.8px;
				margin-top: 2px;
			}

			.history-item {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 8px;
				padding: 10px 0;
				border-bottom: 1px solid rgba(71, 82, 88, 0.35);
				font-size: 0.85rem;
				align-items: start;
			}

			.history-item:last-child {
				border-bottom: none;
			}

			.history-date {
				font-size: 0.72rem;
				color: var(--tx3);
				font-family: var(--mono);
			}

			.history-label-text {
				color: var(--tx1);
				font-weight: 500;
			}

			.history-breakdown {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
				margin-top: 4px;
			}

			.history-tag {
				font-family: var(--mono);
				font-size: 0.72rem;
				padding: 2px 7px;
				border-radius: 4px;
				font-weight: 500;
			}

			.history-amount {
				font-family: var(--mono);
				font-weight: 600;
				font-size: 0.95rem;
				text-align: right;
				white-space: nowrap;
			}

			.history-empty {
				text-align: center;
				padding: 24px;
				color: var(--tx3);
				font-size: 0.85rem;
			}

			.section-gap {
				margin-bottom: 20px;
			}

			.section-label {
				font-size: 0.72rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1.2px;
				color: var(--tx3);
				margin-bottom: 10px;
				padding-left: 2px;
			}

			.validation-msg {
				font-size: 0.78rem;
				color: var(--color-red);
				margin-top: 4px;
				min-height: 1.2em;
			}

			.hint {
				font-size: 0.7rem;
				color: var(--tx3);
				margin-top: 3px;
			}

			.overlay {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.55);
				display: none;
				align-items: center;
				justify-content: center;
				z-index: 100;
				padding: 20px;
			}

			.overlay.visible {
				display: flex;
			}

			.confirm-box {
				background: var(--bg1);
				border: 1px solid var(--ui1);
				border-radius: var(--radius-l);
				padding: 24px;
				max-width: 360px;
				width: 100%;
				text-align: center;
			}

			.confirm-box p {
				margin-bottom: 16px;
				font-size: 0.9rem;
				line-height: 1.5;
			}

			.confirm-actions {
				display: flex;
				gap: 10px;
				justify-content: center;
			}

			::-webkit-scrollbar {
				width: 6px;
			}
			::-webkit-scrollbar-track {
				background: transparent;
			}
			::-webkit-scrollbar-thumb {
				background: var(--ui1);
				border-radius: 3px;
			}
		</style>
	</head>
	<body>
		<div class="app">
			<div class="app-header">
				<div class="app-title">Allocateur d'apports</div>
			</div>

			<div class="section-label">État des fonds</div>
			<div class="funds-grid" id="fundsGrid"></div>

			<div class="section-gap"></div>

			<div class="section-label">Nouvel apport</div>
			<div class="card" id="inputCard">
				<input
					type="number"
					id="amountInput"
					class="amount-input"
					placeholder="0 €"
					min="0.01"
					step="0.01"
					inputmode="decimal"
				/>
				<div class="validation-msg" id="amountError"></div>
				<div style="margin-top: 10px">
					<input
						type="text"
						id="labelInput"
						placeholder="Label optionnel — ex. cadeau anniversaire"
						maxlength="80"
					/>
				</div>
				<div style="margin-top: 12px">
					<button class="btn btn-primary" id="allocateBtn" disabled>
						Allouer
					</button>
				</div>
				<div class="result-panel" id="resultPanel">
					<div class="result-divider"></div>
					<div class="result-title">Allocation calculée</div>
					<div id="resultRows"></div>
					<div class="result-rule" id="resultRule"></div>
					<div style="margin-top: 12px; text-align: center">
						<button class="btn btn-confirm" id="confirmBtn">
							Confirmer et enregistrer
						</button>
					</div>
				</div>
			</div>

			<div class="section-gap"></div>

			<div class="section-label">Paramètres</div>
			<div class="toggle-header" id="settingsToggle" role="button" tabindex="0">
				<span class="card-label" style="margin: 0"
					>Configuration de l'algorithme</span
				>
				<span class="chevron">▼</span>
			</div>
			<div class="toggle-body" id="settingsBody">
				<div class="settings-row">
					<div class="input-group">
						<label class="input-label">Seuil d'impact (€)</label>
						<input type="number" id="seuilInput" min="1" step="1" />
						<div class="hint">En dessous → 100 % plaisir</div>
					</div>
					<div class="input-group">
						<label class="input-label">Cible fonds plaisir (€)</label>
						<input type="number" id="ciblePlaisirInput" min="0" step="50" />
						<div class="hint">Rempli en priorité comme urgence/réserve</div>
					</div>
				</div>
				<div class="settings-row">
					<div class="input-group">
						<label class="input-label">Cible urgence (€)</label>
						<input type="number" id="cibleUrgenceInput" min="0" step="500" />
					</div>
					<div class="input-group">
						<label class="input-label">Cible réserve (€)</label>
						<input type="number" id="cibleReserveInput" min="0" step="500" />
					</div>
				</div>
				<div class="settings-row">
					<div class="input-group">
						<label class="input-label">Cible ETF (€)</label>
						<input type="number" id="cibleEtfInput" min="0" step="1000" />
						<div class="hint">
							Objectif long terme — barre de progression uniquement
						</div>
					</div>
					<div></div>
				</div>
				<div class="input-group">
					<label class="input-label">Répartition ETF / Plaisir (%)</label>
					<div class="settings-row" style="margin-bottom: 8px">
						<div>
							<div class="fund-edit-label">ETF</div>
							<input
								type="number"
								id="ratioEtfInput"
								min="0"
								max="100"
								step="1"
							/>
						</div>
						<div>
							<div class="fund-edit-label">Plaisir</div>
							<input
								type="number"
								id="ratioPlaisirInput"
								min="0"
								max="100"
								step="1"
							/>
						</div>
					</div>
					<div class="ratio-display" id="ratioDisplay"></div>
				</div>
				<div
					style="
						margin-top: 14px;
						padding-top: 14px;
						border-top: 1px solid var(--ui1);
					"
				>
					<button
						class="btn btn-danger"
						id="resetSoldesBtn"
						style="width: 100%"
					>
						↺ Remettre les soldes à zéro
					</button>
				</div>
			</div>

			<div class="section-gap"></div>

			<div class="section-label">Statistiques</div>
			<div class="toggle-header" id="totalsToggle" role="button" tabindex="0">
				<span class="card-label" style="margin: 0">Totaux cumulés</span>
				<span class="chevron">▼</span>
			</div>
			<div class="toggle-body" id="totalsBody">
				<div class="totals-row" id="totalsRow"></div>
			</div>

			<div class="section-gap"></div>

			<div
				style="
					display: flex;
					align-items: center;
					justify-content: space-between;
					margin-bottom: 10px;
				"
			>
				<div class="section-label" style="margin: 0">Historique</div>
				<button class="btn btn-ghost" id="resetBtn" style="font-size: 0.72rem">
					Réinitialiser
				</button>
			</div>
			<div class="card" style="padding: 8px 16px">
				<div id="historyList"></div>
			</div>
		</div>

		<div class="overlay" id="confirmOverlay">
			<div class="confirm-box">
				<p id="confirmText"></p>
				<div class="confirm-actions">
					<button class="btn btn-ghost" id="confirmCancel">Annuler</button>
					<button class="btn btn-danger" id="confirmOk">Confirmer</button>
				</div>
			</div>
		</div>

		<script>
			const STORAGE_KEY = "allocateur-state";
			const DEFAULT_STATE = {
				params: { seuil_impact: 200, ratio_etf: 60, ratio_plaisir: 40 },
				funds: {
					urgence: { actuel: 0, cible: 12000 },
					reserve: { actuel: 0, cible: 5000 },
					plaisir: { actuel: 0, cible: 3000 },
					etf: { actuel: 0, cible: 27000 },
				},
				history: [],
				totals: { etf: 0, plaisir: 0, urgence: 0, reserve: 0 },
			};

			let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
			let pendingAllocation = null;

			// ── Storage ──
			const store = {
				async get(k) {
					if (typeof window.storage?.get === "function")
						return window.storage.get(k);
					const v = localStorage.getItem(k);
					return v ? { value: v } : null;
				},
				async set(k, v) {
					if (typeof window.storage?.set === "function")
						return window.storage.set(k, v);
					localStorage.setItem(k, v);
				},
			};

			async function loadState() {
				try {
					const r = await store.get(STORAGE_KEY);
					if (r && r.value) {
						const s = JSON.parse(r.value);
						state = {
							params: { ...DEFAULT_STATE.params, ...s.params },
							funds: {
								urgence: {
									...DEFAULT_STATE.funds.urgence,
									...s.funds?.urgence,
								},
								reserve: {
									...DEFAULT_STATE.funds.reserve,
									...s.funds?.reserve,
								},
								plaisir: {
									...DEFAULT_STATE.funds.plaisir,
									...s.funds?.plaisir,
								},
								etf: { ...DEFAULT_STATE.funds.etf, ...s.funds?.etf },
							},
							history: s.history || [],
							totals: { ...DEFAULT_STATE.totals, ...s.totals },
						};
					}
				} catch (e) {
					console.log("Load failed:", e.message);
				}
			}

			async function saveState() {
				try {
					await store.set(STORAGE_KEY, JSON.stringify(state));
				} catch (e) {
					console.log("Save failed:", e.message);
				}
			}

			// ── Algorithm ──
			function allocate(montant) {
				const p = state.params;
				const f = state.funds;
				let rem = montant;
				const alloc = { urgence: 0, reserve: 0, plaisir: 0, etf: 0 };
				const rules = [];

				// Priority 1 → Urgence
				if (f.urgence.actuel < f.urgence.cible) {
					const fill = r2(Math.min(rem, f.urgence.cible - f.urgence.actuel));
					alloc.urgence = fill;
					rem = r2(rem - fill);
					rules.push(
						`Fonds d'urgence sous la cible (${fmt(f.urgence.actuel)} / ${fmt(f.urgence.cible)}) → remplissage prioritaire`,
					);
				}

				// Priority 2 → Réserve
				if (rem > 0 && f.reserve.actuel < f.reserve.cible) {
					const fill = r2(Math.min(rem, f.reserve.cible - f.reserve.actuel));
					alloc.reserve = fill;
					rem = r2(rem - fill);
					rules.push(
						`Fonds de réserve sous la cible (${fmt(f.reserve.actuel)} / ${fmt(f.reserve.cible)}) → remplissage prioritaire`,
					);
				}

				if (rem <= 0) return { alloc, rules };

				// Marge disponible dans le fonds plaisir
				const plaisirRoom = r2(
					Math.max(0, f.plaisir.cible - (f.plaisir.actuel + alloc.plaisir)),
				);

				// < seuil → plaisir jusqu'au plafond, surplus → ETF
				if (rem <= p.seuil_impact) {
					const toP = r2(Math.min(rem, plaisirRoom));
					const toE = r2(rem - toP);
					if (toP > 0) alloc.plaisir = r2(alloc.plaisir + toP);
					if (toE > 0) alloc.etf = r2(alloc.etf + toE);
					if (toP > 0 && toE > 0) {
						rules.push(
							`Restant ${fmt(rem)} <= seuil → ${fmt(toP)} Plaisir (plafond) + ${fmt(toE)} ETF`,
						);
					} else if (toP > 0) {
						rules.push(`Restant ${fmt(rem)} <= seuil d'impact → 100 % Plaisir`);
					} else {
						rules.push(
							`Restant ${fmt(rem)} <= seuil mais plaisir au plafond → 100 % ETF`,
						);
					}
					return { alloc, rules };
				}

				// ≥ seuil → ratio split, plaisir plafonné à la cible
				const plaisirWanted = r2((rem * p.ratio_plaisir) / 100);
				const plaisirActual = r2(Math.min(plaisirWanted, plaisirRoom));
				const etfActual = r2(rem - plaisirActual);
				if (plaisirActual > 0)
					alloc.plaisir = r2(alloc.plaisir + plaisirActual);
				alloc.etf = r2(alloc.etf + etfActual);
				if (plaisirActual < plaisirWanted) {
					rules.push(
						`Ratio ${p.ratio_etf}/${p.ratio_plaisir} plafonné : Plaisir capé à ${fmt(plaisirActual)} (plafond) · surplus → ETF ${fmt(etfActual)}`,
					);
				} else {
					rules.push(
						`Répartition standard : ${p.ratio_etf}\u202f% ETF (${fmt(etfActual)}) · ${p.ratio_plaisir}\u202f% Plaisir (${fmt(plaisirActual)})`,
					);
				}

				return { alloc, rules };
			}

			// ── Rendering ──
			const FUND_META = {
				urgence: {
					label: "Fonds d'urgence",
					color: "var(--color-red)",
					dim: "var(--color-red-dim)",
					hasCible: true,
				},
				reserve: {
					label: "Fonds de réserve",
					color: "var(--color-orange)",
					dim: "var(--color-orange-dim)",
					hasCible: true,
				},
				plaisir: {
					label: "Fonds plaisir",
					color: "var(--color-purple)",
					dim: "var(--color-purple-dim)",
					hasCible: true,
				},
				etf: {
					label: "ETF long terme",
					color: "var(--color-blue)",
					dim: "var(--color-blue-dim)",
					hasCible: true,
				},
			};

			function renderFunds() {
				const grid = document.getElementById("fundsGrid");
				grid.innerHTML = "";
				for (const [key, meta] of Object.entries(FUND_META)) {
					const f = state.funds[key];
					const pct =
						meta.hasCible && f.cible > 0
							? Math.min(100, (f.actuel / f.cible) * 100)
							: null;
					let h = `<div class="fund-card ${key}">
      <div class="fund-name">${meta.label}</div>
      <div class="fund-amounts">
        <span class="fund-current" style="color:${meta.color}">${fmt(f.actuel)}</span>
        ${meta.hasCible ? `<span class="fund-target">/ ${fmt(f.cible)}</span>` : ""}
      </div>`;
					if (pct !== null) {
						h += `<div class="fund-bar"><div class="fund-bar-fill" style="width:${pct}%;background:${pct >= 100 ? "var(--color-green)" : meta.color}"></div></div>`;
					}
					const etfLine =
						key === "etf" && f.actuel > 0
							? `<div class="etf-rule">4 % → <strong>${fmt(r2((f.actuel * 0.04) / 12))}</strong>/mois</div>`
							: "";
					h += `<div><div class="fund-edit-label">Solde actuel</div>
      <input type="number" class="fund-solo-input" data-fund="${key}" data-field="actuel" value="${f.actuel}" min="0" step="1">
    </div>${etfLine}</div>`;
					grid.innerHTML += h;
				}
				grid.querySelectorAll("input[data-fund]").forEach((input) => {
					input.addEventListener("change", () => {
						state.funds[input.dataset.fund][input.dataset.field] = Math.max(
							0,
							parseFloat(input.value) || 0,
						);
						saveState();
						renderFunds();
					});
				});
			}

			function renderTotals() {
				const t = state.totals;
				const total = t.etf + t.plaisir + t.urgence + t.reserve;
				document.getElementById("totalsRow").innerHTML = [
					{ v: t.etf, c: "var(--color-blue)", l: "ETF" },
					{ v: t.plaisir, c: "var(--color-purple)", l: "Plaisir" },
					{ v: t.urgence, c: "var(--color-red)", l: "Urgence" },
					{ v: t.reserve, c: "var(--color-orange)", l: "Réserve" },
					{ v: total, c: "var(--tx1)", l: "Total" },
				]
					.map(
						(x) =>
							`<div class="total-item"><div class="total-value" style="color:${x.c}">${fmt(x.v)}</div><div class="total-label">${x.l}</div></div>`,
					)
					.join("");
			}

			function renderHistory() {
				const list = document.getElementById("historyList");
				if (!state.history.length) {
					list.innerHTML =
						'<div class="history-empty">Aucun apport enregistré</div>';
					return;
				}
				const tagMap = {
					urgence: {
						dim: "var(--color-red-dim)",
						col: "var(--color-red)",
						pre: "Urg.",
					},
					reserve: {
						dim: "var(--color-orange-dim)",
						col: "var(--color-orange)",
						pre: "Rés.",
					},
					plaisir: {
						dim: "var(--color-purple-dim)",
						col: "var(--color-purple)",
						pre: "Plaisir",
					},
					etf: {
						dim: "var(--color-blue-dim)",
						col: "var(--color-blue)",
						pre: "ETF",
					},
				};
				list.innerHTML = state.history
					.slice()
					.reverse()
					.map((h) => {
						const tags = Object.entries(tagMap)
							.filter(([k]) => h.alloc[k] > 0)
							.map(
								([k, t]) =>
									`<span class="history-tag" style="background:${t.dim};color:${t.col}">${t.pre} ${fmt(h.alloc[k])}</span>`,
							)
							.join("");
						return `<div class="history-item"><div>
      <div class="history-date">${h.date}</div>
      <div class="history-label-text">${h.label || "Apport"}</div>
      <div class="history-breakdown">${tags}</div>
    </div><div class="history-amount">${fmt(h.montant)}</div></div>`;
					})
					.join("");
			}

			function renderSettings() {
				document.getElementById("seuilInput").value = state.params.seuil_impact;
				document.getElementById("ciblePlaisirInput").value =
					state.funds.plaisir.cible;
				document.getElementById("cibleUrgenceInput").value =
					state.funds.urgence.cible;
				document.getElementById("cibleReserveInput").value =
					state.funds.reserve.cible;
				document.getElementById("cibleEtfInput").value = state.funds.etf.cible;
				document.getElementById("ratioEtfInput").value = state.params.ratio_etf;
				document.getElementById("ratioPlaisirInput").value =
					state.params.ratio_plaisir;
				updateRatioDisplay();
			}

			function updateRatioDisplay() {
				const e = parseInt(document.getElementById("ratioEtfInput").value) || 0;
				const p =
					parseInt(document.getElementById("ratioPlaisirInput").value) || 0;
				const s = e + p;
				const d = document.getElementById("ratioDisplay");
				d.className = "ratio-display " + (s === 100 ? "valid" : "invalid");
				d.textContent =
					s === 100
						? `ETF ${e}% + Plaisir ${p}% = 100% ✓`
						: `ETF ${e}% + Plaisir ${p}% = ${s}% — doit faire 100%`;
				return s === 100;
			}

			function showResult(montant, label, alloc, rules) {
				const panel = document.getElementById("resultPanel");
				const entries = [
					{
						key: "urgence",
						label: "Fonds d'urgence",
						color: "var(--color-red)",
					},
					{
						key: "reserve",
						label: "Fonds de réserve",
						color: "var(--color-orange)",
					},
					{ key: "plaisir", label: "Plaisir", color: "var(--color-purple)" },
					{ key: "etf", label: "ETF long terme", color: "var(--color-blue)" },
				].filter((e) => alloc[e.key] > 0);
				document.getElementById("resultRows").innerHTML = entries
					.map(
						(e) =>
							`<div class="result-row"><div class="result-label"><span class="result-dot" style="background:${e.color}"></span>${e.label}</div><div class="result-amount" style="color:${e.color}">${fmt(alloc[e.key])}</div></div>`,
					)
					.join("");
				document.getElementById("resultRule").innerHTML = rules
					.map((r) => `<span class="rule-icon">→</span>${r}`)
					.join("<br>");
				panel.classList.add("visible");
				panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
				pendingAllocation = { montant, label, alloc, rules };
			}

			function renderAll() {
				renderFunds();
				renderTotals();
				renderHistory();
				renderSettings();
			}

			// ── Events ──
			function setupEvents() {
				const amtIn = document.getElementById("amountInput");
				const lblIn = document.getElementById("labelInput");
				const aBtn = document.getElementById("allocateBtn");
				const aErr = document.getElementById("amountError");
				const rPan = document.getElementById("resultPanel");

				amtIn.addEventListener("input", () => {
					const v = parseFloat(amtIn.value);
					if (amtIn.value === "") {
						aErr.textContent = "";
						amtIn.classList.remove("error");
						aBtn.disabled = true;
					} else if (isNaN(v) || v <= 0) {
						aErr.textContent = "Le montant doit être strictement positif";
						amtIn.classList.add("error");
						aBtn.disabled = true;
					} else {
						aErr.textContent = "";
						amtIn.classList.remove("error");
						aBtn.disabled = false;
					}
					rPan.classList.remove("visible");
					pendingAllocation = null;
				});

				aBtn.addEventListener("click", () => {
					const m = r2(parseFloat(amtIn.value));
					if (isNaN(m) || m <= 0) return;
					if (
						(parseInt(document.getElementById("ratioEtfInput").value) || 0) +
							(parseInt(document.getElementById("ratioPlaisirInput").value) ||
								0) !==
						100
					) {
						alert(
							"Les ratios ETF + Plaisir doivent faire 100 %. Corrige les paramètres.",
						);
						return;
					}
					const { alloc, rules } = allocate(m);
					showResult(m, lblIn.value.trim(), alloc, rules);
				});

				document.getElementById("confirmBtn").addEventListener("click", () => {
					if (!pendingAllocation) return;
					const { montant, label, alloc } = pendingAllocation;
					for (const k of ["urgence", "reserve", "plaisir", "etf"]) {
						state.funds[k].actuel = r2(state.funds[k].actuel + alloc[k]);
						state.totals[k] = r2(state.totals[k] + alloc[k]);
					}
					const now = new Date();
					state.history.push({
						date:
							now.toLocaleDateString("fr-BE") +
							" " +
							now.toLocaleTimeString("fr-BE", {
								hour: "2-digit",
								minute: "2-digit",
							}),
						label: label || "",
						montant,
						alloc: { ...alloc },
					});
					saveState();
					renderAll();
					amtIn.value = "";
					lblIn.value = "";
					aBtn.disabled = true;
					rPan.classList.remove("visible");
					pendingAllocation = null;
				});

				setupToggle("settingsToggle", "settingsBody");
				setupToggle("totalsToggle", "totalsBody");

				const bindCible = (id, fund) => {
					document.getElementById(id).addEventListener("change", function () {
						state.funds[fund].cible = Math.max(0, parseInt(this.value) || 0);
						this.value = state.funds[fund].cible;
						saveState();
						renderFunds();
					});
				};
				bindCible("ciblePlaisirInput", "plaisir");
				bindCible("cibleUrgenceInput", "urgence");
				bindCible("cibleReserveInput", "reserve");
				bindCible("cibleEtfInput", "etf");

				document
					.getElementById("seuilInput")
					.addEventListener("change", function () {
						state.params.seuil_impact = Math.max(
							1,
							parseInt(this.value) || 200,
						);
						this.value = state.params.seuil_impact;
						saveState();
					});

				const rh = () => {
					const e = clamp(
						parseInt(document.getElementById("ratioEtfInput").value) || 0,
						0,
						100,
					);
					const p = clamp(
						parseInt(document.getElementById("ratioPlaisirInput").value) || 0,
						0,
						100,
					);
					document.getElementById("ratioEtfInput").value = e;
					document.getElementById("ratioPlaisirInput").value = p;
					if (updateRatioDisplay()) {
						state.params.ratio_etf = e;
						state.params.ratio_plaisir = p;
						saveState();
					}
				};
				document.getElementById("ratioEtfInput").addEventListener("change", rh);
				document
					.getElementById("ratioPlaisirInput")
					.addEventListener("change", rh);

				document.getElementById("resetBtn").addEventListener("click", () => {
					showConfirm("Supprimer tout l\u2019historique\u00a0?", () => {
						state.history = [];
						state.totals = { etf: 0, plaisir: 0, urgence: 0, reserve: 0 };
						rPan.classList.remove("visible");
						pendingAllocation = null;
						saveState();
						renderAll();
					});
				});

				document
					.getElementById("resetSoldesBtn")
					.addEventListener("click", () => {
						showConfirm("Remettre tous les soldes à zéro ?", () => {
							for (const k of ["urgence", "reserve", "plaisir", "etf"])
								state.funds[k].actuel = 0;
							saveState();
							renderAll();
						});
					});

				document
					.getElementById("confirmCancel")
					.addEventListener("click", hideConfirm);
			}

			function setupToggle(tId, bId) {
				const t = document.getElementById(tId),
					b = document.getElementById(bId);
				t.addEventListener("click", () => {
					t.classList.toggle("open");
					b.classList.toggle("open");
				});
			}

			let confirmCb = null;
			function showConfirm(txt, cb) {
				document.getElementById("confirmText").textContent = txt;
				document.getElementById("confirmOverlay").classList.add("visible");
				confirmCb = cb;
				document.getElementById("confirmOk").onclick = () => {
					const cb = confirmCb;
					hideConfirm();
					if (cb) cb();
				};
			}
			function hideConfirm() {
				document.getElementById("confirmOverlay").classList.remove("visible");
				confirmCb = null;
			}

			function fmt(n) {
				return (
					n.toLocaleString("fr-BE", {
						minimumFractionDigits: 0,
						maximumFractionDigits: 0,
					}) + " €"
				);
			}
			function r2(n) {
				return Math.round(n * 100) / 100;
			}
			function clamp(v, lo, hi) {
				return Math.max(lo, Math.min(hi, v));
			}

			async function init() {
				await loadState();
				renderAll();
				setupEvents();
			}
			init();
		</script>
	</body>
</html>
